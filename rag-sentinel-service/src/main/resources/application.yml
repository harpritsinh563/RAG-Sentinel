spring:
  application:
    name: rag-observer-sentinel
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/vectordb
    username: postgres
    password: password
  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: phi3
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: true

management:
  otlp:
    tracing:
      endpoint: http://127.0.0.1:4318/v1/traces
      transport: http
    metrics:
      export:
        url: http://127.0.0.1:4318/v1/metrics
        step: 10s
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    distribution:
      percentiles-histogram:
        all: true # Useful for latency heatmaps in Grafana